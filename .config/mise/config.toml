"npm:@anthropic-ai/claude-code" = "2.1.112"
"npm:opencode-ai" = "1.14.29"
"npm:@github/copilot" = "1.0.36"
"npm:agent-browser" = "0.26.0"
"npm:skills" = "1.5.1"
"npm:ocx" = "2.0.7"
"npm:@cortexkit/opencode-magic-context" = "0.15.7"
"npm:@cortexkit/aft" = "0.17.3"
"npm:@marcusrbrown/infra" = "latest"

# Language Servers
"npm:pyright" = "1.1.409"
"npm:remark-language-server" = "3.0.0"
"npm:typescript-language-server" = "5.1.3"

"github:mazznoer/lolcrab" = "0.4.1"

[env]
UV_SYSTEM_CERTS = "true"
NPM_TOKEN = "{{ env.NPM_TOKEN | default(value='') }}"
_.file = [{ path = "{{ env.HOME }}/.config/mise/.env.local", redact = true }]

[settings]
idiomatic_version_file_enable_tools = ["node"]

[settings.npm]
bun = true
