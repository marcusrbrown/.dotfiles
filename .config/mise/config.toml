 # shfmt
"aqua:mvdan/sh" = "3.13.1"

"npm:typescript" = "6.0.3"
"npm:vibe-tools" = "0.63.3"
"npm:playwright" = "1.59.1"
"npm:puppeteer" = "24.42.0"
"npm:prettier" = "3.8.3"
"npm:@bfra.me/prettier-config" = "0.16.8"
"npm:@biomejs/biome" = "2.4.13"
