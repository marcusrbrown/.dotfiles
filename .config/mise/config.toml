[tools]
node = "24.16.0"
npm = "11.15.0"
bun = "1.3.14"
pnpm = "11.3.0"
python = "3.14.5"
"pipx:poetry" = "2.4.1"
deno = "2.8.1"
rust = "1.95.0"
cargo-binstall = "1.19.1"
zig = "0.15.2"
zls = "0.16.0"
go = "1.26.3"
ast-grep = "0.42.3"

 # shfmt
"aqua:mvdan/sh" = "3.13.1"
"aqua:gitleaks/gitleaks" = "8.30.1"

"npm:typescript" = "6.0.3"
"npm:vibe-tools" = "0.63.3"
"npm:playwright" = "1.60.0"
"npm:puppeteer" = "25.0.4"
"npm:prettier" = "3.8.3"
"npm:@bfra.me/prettier-config" = "0.16.9"
"npm:@biomejs/biome" = "2.4.15"
"npm:rimraf" = "6.1.3"
"npm:tsx" = "4.22.3"
"npm:@anthropic-ai/claude-code" = "2.1.112"
"npm:opencode-ai" = "1.15.11"
"npm:@github/copilot" = "1.0.54"
"npm:agent-browser" = "0.27.0"
"npm:skills" = "1.5.7"
"npm:ocx" = "2.0.11"
"npm:@marcusrbrown/infra" = "latest"

# Language Servers
"npm:pyright" = "1.1.409"
"npm:typescript-language-server" = "5.3.0"

[env]
UV_SYSTEM_CERTS = "true"
NPM_TOKEN = "{{ env.NPM_TOKEN | default(value='') }}"
_.file = [{ path = "{{ env.HOME }}/.config/mise/.env.local", redact = true }]

[settings]
idiomatic_version_file_enable_tools = ["node"]

[settings.npm]
bun = true
