[tools]
node = "24.18.0"
npm = "11.18.0"
bun = "1.3.14"
pnpm = "11.13.0"
python = "3.14.6"
"pipx:poetry" = "2.4.1"
deno = "2.9.3"
rust = "1.97.1"
cargo-binstall = "1.21.0"
zig = "0.15.2"
zls = "0.16.0"
go = "1.26.5"
ast-grep = "0.44.1"

 # shfmt
"aqua:mvdan/sh" = "3.13.1"
"aqua:gitleaks/gitleaks" = "8.30.1"

"npm:typescript" = "6.0.3"
"npm:vibe-tools" = "0.63.3"
"npm:playwright" = "1.61.1"
"npm:puppeteer" = "25.3.0"
"npm:prettier" = "3.9.5"
"npm:@bfra.me/prettier-config" = "0.16.9"
"npm:@biomejs/biome" = "2.5.4"
"npm:rimraf" = "6.1.3"
"npm:tsx" = "4.23.1"
"npm:@anthropic-ai/claude-code" = "2.1.128"
"npm:opencode-ai" = "1.17.20"
"npm:@fro.bot/harness" = "1.17.20-harness.b78cc9e1"
"npm:@github/copilot" = "1.0.70"
"npm:agent-browser" = "0.32.0"
"npm:skills" = "1.5.17"
"npm:ocx" = "2.0.11"
"npm:@marcusrbrown/infra" = "latest"

# Language Servers
"npm:pyright" = "1.1.411"
"npm:typescript-language-server" = "5.3.0"

[env]
UV_SYSTEM_CERTS = "true"
NPM_TOKEN = "{{ env.NPM_TOKEN | default(value='') }}"
_.file = [{ path = "{{ env.HOME }}/.config/mise/.env.local", redact = true }]

[settings]
idiomatic_version_file_enable_tools = ["node"]

[settings.npm]
bun = true
